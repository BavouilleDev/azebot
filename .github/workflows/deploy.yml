# Déploiement automatique vers le VPS (repo privé OK : le runner GitHub a accès au code).
# Secrets à configurer dans le dépôt : Settings → Secrets and variables → Actions
#   VPS_HOST          IP ou hostname du VPS
#   VPS_USER          utilisateur Linux (ex. ubuntu, deploy)
#   VPS_DEPLOY_PATH   chemin absolu du bot sur le VPS (ex. /home/ubuntu/azebot)
#   VPS_SSH_PRIVATE_KEY  clé privée SSH dont la clé publique est dans ~/.ssh/authorized_keys sur le VPS
# Optionnel :
#   VPS_SSH_PORT      port SSH si différent de 22

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rsync and restart
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -p ${PORT} -o IdentitiesOnly=yes"
          rsync -avz --delete \
            --exclude '.env' \
            --exclude 'data' \
            --exclude 'node_modules' \
            --exclude '.git' \
            -e "$RSYNC_SSH" \
            ./ \
            "${VPS_USER}@${VPS_HOST}:${VPS_DEPLOY_PATH}/"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "cd \"${VPS_DEPLOY_PATH}\" && npm ci --omit=dev && sudo systemctl restart azebot"
